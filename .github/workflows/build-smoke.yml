name: build-smoke

# FIBR-0003 — the opt-in bundling smoke-test. NOT run on every push (that would
# make the fast gate slow); it runs on demand and weekly, freezing the stub into
# a PyInstaller onefile + AppImage and launching each in a Python-free container.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1" # weekly, Monday 04:00 UTC

permissions:
  contents: read

jobs:
  build-smoke:
    name: freeze + clean-room launch
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dev dependency group
        run: python -m pip install --group dev

      - name: Install project runtime dependencies
        run: python -m pip install .

      - name: Install gitleaks
        run: |
          version=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      # Runs the full gate PLUS the build+clean-room integration test. The
      # runner's Docker is used (no podman); build-smoke.sh falls back to it.
      - name: Run the gate with the build smoke-test
        run: ./scripts/ci-local.sh --build
